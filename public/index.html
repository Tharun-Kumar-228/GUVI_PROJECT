<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Manager Pro version v4
        
            </h1>
            <p>Automated Pipeline Demo</p>
        </header>
        
        <main>
            <section class="task-input-card">
                <input type="text" id="task-name" placeholder="Enter Task Name..." aria-label="Task Name">
                <button id="add-task-btn">Add Task</button>
            </section>

            <section class="task-list-card">
                <h2>Your Tasks</h2>
                <ul id="task-list">
                    <!-- Tasks will be added here dynamically -->
                </ul>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Developed with ❤️ for GUVI Project</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
